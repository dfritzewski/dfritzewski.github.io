name: Update publications

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday at 6am UTC
  workflow_dispatch:        # also lets you trigger it manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check token is set
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: |
          if [ -z "$ADS_TOKEN" ]; then
            echo "ERROR: ADS_TOKEN secret is empty or not set"
            exit 1
          else
            echo "ADS_TOKEN is set (length: ${#ADS_TOKEN})"
          fi

      - name: Fetch publications from ADS
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: |
          python3 fetch_pubs.py

      - name: Commit updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update publications"
          git push